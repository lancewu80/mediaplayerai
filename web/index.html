<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MediaPlayer AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { background: #16213e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 12px; height: 12px; border-radius: 50%;
      background: #e94560; cursor: pointer; margin-top: -4px;
    }
    input[type=range]::-webkit-slider-runnable-track {
      height: 4px; background: #3a3a5c; border-radius: 2px;
    }
    input[type=range][style*="writing-mode: vertical"]::-webkit-slider-runnable-track {
      width: 4px; height: 100%;
    }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #1a1a2e; }
    ::-webkit-scrollbar-thumb { background: #3a3a5c; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: #e94560; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
